[[news]]
date = "2024"
content = "第一作者论文（超短期风电功率预测）发表于 [IEEE IECON 2024](https://doi.org/10.1109/IECON55916.2024.10905784)。"

[[news]]
date = "2023-09"
content = "加入英国**杜伦大学**工学院担任博士后研究员，参与 EPSRC VPP-WARD 与 CHEDDAR 项目。"

[[news]]
